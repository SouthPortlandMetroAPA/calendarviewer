<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SPM APA — Where We Play</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      /* Palette and card language lifted from CalendarViewer so the two public
         pages read as one product. Do not diverge these without changing both. */
      :root {
        --spm-primary: #ea002a;
        --spm-accent:  #0031a1;
        --bg:     #f5f5f5;
        --card:   #ffffff;
        --border: #e1e1e1;
        --text:   #1f1f1f;
        --muted:  #666;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: var(--bg); color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 16px;
      }
      .page { max-width: 1100px; margin: 0 auto; padding: 16px; }

      header {
        border-radius: 22px; padding: 22px 20px 20px; color: #fff;
        background: linear-gradient(135deg, var(--spm-primary), var(--spm-accent));
        box-shadow: 0 6px 18px rgba(0,0,0,.25); text-align: center; margin-bottom: 16px;
      }
      .title    { font-size: 1.5rem; font-weight: 900; line-height: 1.08; }
      .subtitle { margin-top: 8px; font-size: 1.15rem; opacity: .95; }
      .count    { margin-top: 10px; font-size: .9rem; opacity: .9; }

      .layout { display: grid; grid-template-columns: 1fr; gap: 16px; }
      @media (min-width: 900px) { .layout { grid-template-columns: 420px 1fr; } }

      #map {
        height: 420px; border-radius: 18px; border: 1px solid var(--border);
        box-shadow: 0 3px 10px rgba(0,0,0,.12); background: #e9e9e9;
      }
      @media (min-width: 900px) { #map { height: 640px; } .map-wrap { order: 2; } .list { order: 1; } }

      .list { display: flex; flex-direction: column; gap: 10px; max-height: 640px; overflow-y: auto; }

      .venue {
        background: var(--card); border: 1px solid var(--border); border-radius: 14px;
        padding: 12px 14px; box-shadow: 0 2px 6px rgba(0,0,0,.08); cursor: pointer;
        transition: transform .12s, box-shadow .12s, border-color .12s;
      }
      .venue:hover, .venue:focus-visible {
        transform: translateY(-2px); box-shadow: 0 5px 14px rgba(0,0,0,.14);
        border-color: var(--spm-accent); outline: none;
      }
      .venue.active { border-color: var(--spm-primary); box-shadow: 0 5px 16px rgba(234,0,42,.22); }
      .v-name { font-weight: 800; font-size: 1.02rem; }
      .v-addr { color: var(--muted); font-size: .9rem; margin-top: 3px; }
      .v-city { color: var(--spm-primary); font-weight: 700; font-size: .74rem;
                letter-spacing: .09em; text-transform: uppercase; margin-top: 6px; }
      .v-links { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
      .v-links a {
        font-size: .8rem; text-decoration: none; color: var(--spm-accent);
        border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px; background: #fafafa;
      }
      .v-links a:hover { border-color: var(--spm-accent); }

      /* Venues OpenStreetMap cannot place. Shown, never silently dropped, and
         never given an invented pin — a wrong pin sends someone to the wrong
         town, which is worse than an honest gap. */
      .unmapped { border-style: dashed; background: #fffaf0; border-color: #f0c36d; }
      .unmapped .v-city::after { content: " · not on the map"; color: var(--muted); font-weight: 600; }

      /* County legend. Sits over the map because the association between a
         shade and a name has to be visible without hunting for it. */
      .legend {
        position: absolute; z-index: 500; right: 12px; top: 12px;
        background: rgba(255,255,255,.94); border: 1px solid var(--border);
        border-radius: 10px; padding: 8px 10px; box-shadow: 0 2px 8px rgba(0,0,0,.15);
        font-size: .78rem; line-height: 1.5;
      }
      .legend-row { display: flex; align-items: center; gap: 7px; white-space: nowrap; }
      .legend-sw { width: 13px; height: 13px; border-radius: 3px; flex: none; }
      .legend-n  { color: var(--muted); font-variant-numeric: tabular-nums; }
      .map-wrap { position: relative; }

      .note {
        margin-top: 14px; font-size: .82rem; color: var(--muted);
        background: var(--card); border: 1px solid var(--border);
        border-radius: 12px; padding: 10px 12px;
      }
      .leaflet-popup-content { font-size: .92rem; line-height: 1.35; }
      .leaflet-popup-content b { display: block; margin-bottom: 2px; }
    </style>
  </head>

      }).addTo(map);
      map.fitBounds(mapped.map(function (v) { return [v.lat, v.lon]; }), { padding: [40, 40] });

      /* Point-in-polygon so the legend can state how many venues each county
         actually holds, rather than asserting a number that could drift from
         the pins. Ray casting; rings are [lon, lat]. */
      function inRing(lon, lat, ring) {
        var inside = false;
        for (var i = 0, j = ring.length - 1; i < ring.length; j = i++) {
          var xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
          if ((yi > lat) !== (yj > lat) && lon < ((xj - xi) * (lat - yi)) / (yj - yi) + xi) inside = !inside;
        }
        return inside;
      }
      function inCounty(lon, lat, g) {
        var polys = g.type === 'Polygon' ? [g.coordinates] : g.coordinates;
        for (var p = 0; p < polys.length; p++) {
          if (!inRing(lon, lat, polys[p][0])) continue;
          var hole = false;
          for (var k = 1; k < polys[p].length; k++) if (inRing(lon, lat, polys[p][k])) hole = true;
          if (!hole) return true;
        }
        return false;
      }

      COUNTIES.forEach(function (c) {
        // interactive:false so the shading never swallows a click meant for a pin.
        L.geoJSON(c.geo, {
          interactive: false,
          style: { color: c.color, weight: 1.6, opacity: 0.65, fillColor: c.color, fillOpacity: 0.10 }
        }).addTo(map);
        c.count = VENUES.filter(function (v) { return inCounty(v.lon, v.lat, c.geo); }).length;
      });

      var elsewhere = VENUES.length - COUNTIES.reduce(function (t, c) { return t + c.count; }, 0);
      document.getElementById('legend').innerHTML =
        COUNTIES.map(function (c) {
          return '<div class="legend-row">' +
            '<span class="legend-sw" style="background:' + c.color + '33;border:1.5px solid ' + c.color + '"></span>' +
            '<span>' + c.name + '</span> <span class="legend-n">' + c.count + '</span></div>';
        }).join('') +
        (elsewhere ? '<div class="legend-row"><span class="legend-sw" style="background:transparent;border:1.5px dotted #999"></span>' +
                     '<span>Elsewhere</span> <span class="legend-n">' + elsewhere + '</span></div>' : '');

      var gmaps = function (v) {
        return 'https://www.google.com/maps/search/?api=1&query=' +
               encodeURIComponent(v.n + ', ' + v.a + ', ' + v.c + ', OR');
      };
      var dirs = function (v) {
        return 'https://www.google.com/maps/dir/?api=1&destination=' +
               encodeURIComponent(v.a + ', ' + v.c + ', OR');
      };

      var markers = {}, cards = {};
      var listEl = document.getElementById('list');

      VENUES.forEach(function (v, i) {
        var card = document.createElement('div');
        card.className = 'venue' + (v.lat === null ? ' unmapped' : '');
        card.tabIndex = 0;
        card.innerHTML =
          '<div class="v-name"></div>' +
          '<div class="v-addr"></div>' +
          '<div class="v-city"></div>' +
          '<div class="v-links">' +
            '<a target="_blank" rel="noopener" class="l-dir">Directions</a>' +
            '<a target="_blank" rel="noopener" class="l-map">Open in Google Maps</a>' +
          '</div>';
        card.querySelector('.v-name').textContent = v.n;
        card.querySelector('.v-addr').textContent = v.a;
        card.querySelector('.v-city').textContent = v.c;
        card.querySelector('.l-dir').href = dirs(v);
        card.querySelector('.l-map').href = gmaps(v);
        listEl.appendChild(card);
        cards[i] = card;

        if (v.lat === null) return;
        var m = L.marker([v.lat, v.lon]).addTo(map);
        var pop = document.createElement('div');
        pop.innerHTML = '<b></b><span></span><br><a target="_blank" rel="noopener">Directions</a>';
        pop.querySelector('b').textContent = v.n;
        pop.querySelector('span').textContent = v.a + ', ' + v.c;
        pop.querySelector('a').href = dirs(v);
        m.bindPopup(pop);
        markers[i] = m;

        var focus = function () {
          Object.keys(cards).forEach(function (k) { cards[k].classList.remove('active'); });
          card.classList.add('active');
          map.setView([v.lat, v.lon], 16, { animate: true });
          m.openPopup();
        };
        card.addEventListener('click', focus);
        card.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); focus(); }
        });
        m.on('click', function () {
          Object.keys(cards).forEach(function (k) { cards[k].classList.remove('active'); });
          card.classList.add('active');
          card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        });
      });

      var missing = VENUES.filter(function (v) { return v.lat === null; });
      document.getElementById('note').innerHTML =
        'Pins are geocoded from the street address. ' +
          (missing.length
            ? missing.length + ' venue' + (missing.length === 1 ? '' : 's') +
              ' could not be geocoded and are listed without a pin. '
            : '') +
        'Tap a venue to zoom to it.';
    </script>
  </body>
</html>
